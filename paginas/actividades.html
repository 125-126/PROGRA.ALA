<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Actividades</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0B1F3A,#0f2f5c,#eef2f7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

/* CONTENEDOR */
.card{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:16px;
    box-shadow:0 10px 40px rgba(0,0,0,.25);
    overflow:hidden;
}

/* HEADER */
.header{
    background:linear-gradient(90deg,#0B1F3A,#1565C0);
    color:white;
    text-align:center;
    padding:20px;
}

.header h1{
    font-size:22px;
}

.header p{
    font-size:14px;
    opacity:.9;
}

/* CUERPO */
.content{
    padding:25px;
    text-align:center;
}

.icon{
    font-size:50px;
    margin-bottom:10px;
}

.title{
    font-size:20px;
    font-weight:600;
    color:#0B1F3A;
    margin-bottom:10px;
}

.message{
    font-size:16px;
    color:#555;
    line-height:1.6;
}

/* BADGE */
.badge{
    margin-top:20px;
    display:inline-block;
    padding:10px 15px;
    background:#2563EB;
    color:white;
    border-radius:30px;
    font-weight:600;
    font-size:14px;
}

/* FOOTER */
.footer{
    margin-top:25px;
    font-size:12px;
    color:#888;
}

</style>

</head>

<body>

<div class="card">

    <div class="header">
        <h1>📅 Actividades</h1>
        <p>Ministerio de Alabanza</p>
    </div>

    <div class="content">

        <div class="icon">⏳</div>

        <div class="title">Estamos organizando el calendario</div>

        <div class="message">
            En este momento estamos por definir las fechas de las próximas actividades, 
            ensayos y eventos del ministerio.
            <br><br>
            Te invitamos a estar atento a las actualizaciones.
        </div>

        <div class="badge">📌 Fechas por confirmar</div>

        <div class="footer">
            Ministerio de Alabanza
        </div>

    </div>

</div>

</body>
</html>
