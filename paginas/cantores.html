<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programa de Cantores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0B1F3A,#0f2f5c,#eef2f7);
    min-height:100vh;
    padding:18px;
    color:#0f172a;
}

/* =========================
   CONTENEDOR
========================= */

.contenedor{
    max-width:100%;
    margin:auto;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

/* =========================
   HEADER
========================= */

.encabezado{
    background:linear-gradient(90deg,#0B1F3A,#1565C0);
    color:white;
    text-align:center;
    padding:20px;
}

.encabezado h1{
    font-size:26px;
}

.encabezado p{
    font-size:14px;
    opacity:.8;
}

/* =========================
   SCROLL HORIZONTAL GANTT
========================= */

.tabla-scroll{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
}

/* IMPORTANTE: fuerza horizontal real */
table{
    border-collapse:collapse;
    min-width:1400px; /* clave Gantt */
    width:max-content;
}

/* =========================
   HEADERS
========================= */

th{
    background:#0B1F3A;
    color:white;
    padding:12px;
    border:1px solid rgba(255,255,255,.1);
    text-align:center;
    font-size:14px;
    position:sticky;
    top:0;
    z-index:2;
}

/* =========================
   CELDAS
========================= */

td{
    border:1px solid #e5e7eb;
    text-align:center;
    padding:10px;
    min-width:70px; /* clave para Gantt */
    transition:.2s;
}

/* =========================
   NOMBRE FIJO IZQUIERDA
========================= */

.nombre{
    position:sticky;
    left:0;
    z-index:5;
    background:#f8fafc;
    min-width:220px;
    text-align:left;
    padding-left:15px;
    font-weight:600;
}

/* header nombre encima */
th.nombre{
    z-index:10;
}

/* =========================
   MESES
========================= */

.mes{
    background:#1565C0;
}

/* =========================
   EFECTO
========================= */

tr:hover td{
    background:#f1f5ff;
}

/* =========================
   ACTIVO (BARRA GANTT)
========================= */

.activo{
    background:#2563EB;
    color:white;
    font-weight:bold;
    border-radius:6px;
}

/* =========================
   IMPORTANTE: NO CAMBIAR TABLA EN MÓVIL
========================= */

@media(max-width:768px){

body{
    padding:10px;
}

/* SOLO MÁS PEQUEÑO, NO REORDENA */
.encabezado h1{
    font-size:18px;
}

td,th{
    font-size:12px;
    padding:8px;
    min-width:65px;
}

/* sigue siendo horizontal */
table{
    min-width:1200px;
}

/* scroll más cómodo */
.tabla-scroll{
    overflow-x:scroll;
}

}

/* =========================
   PRINT
========================= */

@media print{
    body{
        background:white;
    }

    .contenedor{
        box-shadow:none;
    }
}

</style>

</head>

<body>

<div class="contenedor">

<!-- HEADER -->
<div class="encabezado">
    <h1>🎤 PROGRAMA DE CANTORES</h1>
    <p>Ministerio de Alabanza</p>
</div>

<!-- TABLA -->
<div class="tabla-scroll">

<table>

<!-- MESES -->
<tr>
<th class="nombre" rowspan="2">Cantor</th>
<th class="mes" colspan="3">JULIO</th>
<th class="mes" colspan="5">AGOSTO</th>
<th class="mes" colspan="4">SEPTIEMBRE</th>
</tr>

<!-- FECHAS -->
<tr>
<th>12</th><th>19</th><th>26</th>
<th>02</th><th>09</th><th>16</th><th>23</th><th>30</th>
<th>06</th><th>13</th><th>20</th><th>27</th>
</tr>

<!-- CARLOS -->
<tr>
<td class="nombre">H. Carlos García</td>
<td class="activo">✔</td><td></td><td></td>
<td></td><td class="activo">✔</td><td></td><td></td><td></td>
<td class="activo">✔</td><td></td><td></td><td></td>
</tr>

<!-- JUAN -->
<tr>
<td class="nombre">H. Juan Monterrosa</td>
<td></td><td class="activo">✔</td><td></td>
<td></td><td></td><td class="activo">✔</td><td></td><td></td>
<td></td><td class="activo">✔</td><td></td><td></td>
</tr>

<!-- GABRIEL -->
<tr>
<td class="nombre">H. Gabriel Olivares</td>
<td></td><td></td><td class="activo">✔</td>
<td></td><td></td><td></td><td class="activo">✔</td><td></td>
<td></td><td></td><td class="activo">✔</td><td></td>
</tr>

<!-- ENRIQUE -->
<tr>
<td class="nombre">H. Enrique Ramírez</td>
<td></td><td></td><td></td>
<td class="activo">✔</td><td></td><td></td><td></td><td class="activo">✔</td>
<td></td><td></td><td></td><td class="activo">✔</td>
</tr>

</table>

</div>


</div>

<!-- JS -->
<script>

document.querySelectorAll("td").forEach(td => {

    if(td.classList.contains("nombre")) return;

    td.addEventListener("click", function(){

        // solo toggle de clase
        this.classList.toggle("activo");

        // no tocar innerHTML → EVITA ERRORES
    });

});

</script>

</body>
</html>
