<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programa de Cantores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE RESET MODERNO
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0B1F3A,#0f2f5c,#eef2f7);
    min-height:100vh;
    padding:18px;
    color:#0f172a;
}

/* =========================
   CONTENEDOR APP
========================= */

.contenedor{
    max-width:1400px;
    margin:auto;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.25);
}

/* =========================
   HEADER APP STYLE
========================= */

.encabezado{
    background:linear-gradient(90deg,#0B1F3A,#1565C0);
    color:white;
    text-align:center;
    padding:22px;
}

.encabezado h1{
    font-size:28px;
    letter-spacing:1px;
}

.encabezado p{
    margin-top:5px;
    opacity:.85;
    font-size:14px;
}

/* =========================
   SCROLL TABLE
========================= */

.tabla-scroll{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
    padding:10px;
}

/* =========================
   TABLA BASE
========================= */

table{
    border-collapse:collapse;
    min-width:1200px;
    width:max-content;
}

/* encabezados */
th{
    background:#0B1F3A;
    color:white;
    padding:12px;
    border:1px solid rgba(255,255,255,.1);
    text-align:center;
    font-size:14px;
    position:sticky;
    top:0;
    z-index:2;
}

/* celdas */
td{
    border:1px solid #e5e7eb;
    text-align:center;
    padding:10px;
    min-width:70px;
    transition:.2s;
}

/* =========================
   NOMBRE FIJO (STICKY)
========================= */

.nombre{
    position:sticky;
    left:0;
    z-index:10;
    background:#f8fafc;
    min-width:240px;
    text-align:left;
    padding-left:15px;
    font-weight:600;
    color:#0f172a;
}

/* header nombre */
th.nombre{
    z-index:20;
}

/* =========================
   MESES HEADER
========================= */

.mes{
    background:#1565C0;
    font-size:15px;
}

/* hover suave */
tr:hover td{
    background:#f1f5ff;
}

/* =========================
   ESTADO ACTIVO
========================= */

.activo{
    background:#2563EB;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:8px;
    transition:.2s;
}

.activo:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

/* =========================
   BOTONES (STYLE APP)
========================= */

.botonera{
    display:flex;
    justify-content:center;
    gap:12px;
    padding:18px;
    background:#f8fafc;
    flex-wrap:wrap;
    border-top:1px solid #e5e7eb;
}

button{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    background:#1565C0;
    color:white;
    font-size:14px;
    cursor:pointer;
    transition:.25s;
    flex:1;
    min-width:120px;
}

button:hover{
    background:#0B1F3A;
    transform:translateY(-2px);
}

/* =========================
   📱 MOBILE (MODO APP REAL)
========================= */

@media(max-width:768px){

body{
    padding:0;
    background:white;
}

/* header más tipo app */
.encabezado{
    padding:16px;
}

.encabezado h1{
    font-size:20px;
}

/* tabla se vuelve más compacta */
.tabla-scroll{
    padding:5px;
}

/* texto más pequeño */
td,th{
    font-size:12px;
    min-width:55px;
    padding:7px;
}

/* nombre más compacto */
.nombre{
    min-width:170px;
}

/* botón estilo app inferior fijo */
.botonera{
    position:sticky;
    bottom:0;
    background:white;
    box-shadow:0 -5px 15px rgba(0,0,0,.1);
}

button{
    font-size:13px;
    padding:10px;
}

}

/* =========================
   PRINT
========================= */

@media print{

button{
    display:none;
}

body{
    background:white;
    padding:0;
}

.contenedor{
    box-shadow:none;
}

}

</style>

</head>

<body>

<div class="contenedor">

<!-- HEADER -->
<div class="encabezado">
    <h1>🎤 PROGRAMA DE CANTORES</h1>
    <p>Ministerio de Alabanza</p>
</div>

<!-- TABLA -->
<div class="tabla-scroll">

<table>

<!-- MESES -->
<tr>
<th class="nombre" rowspan="2">Cantor</th>
<th class="mes" colspan="3">JULIO</th>
<th class="mes" colspan="5">AGOSTO</th>
<th class="mes" colspan="4">SEPTIEMBRE</th>
</tr>

<!-- FECHAS -->
<tr>
<th>12</th><th>19</th><th>26</th>
<th>02</th><th>09</th><th>16</th><th>23</th><th>30</th>
<th>06</th><th>13</th><th>20</th><th>27</th>
</tr>

<!-- CARLOS -->
<tr>
<td class="nombre">H. Carlos García</td>
<td class="activo">✔</td><td></td><td></td>
<td></td><td class="activo">✔</td><td></td><td></td><td></td>
<td class="activo">✔</td><td></td><td></td><td></td>
</tr>

<!-- JUAN -->
<tr>
<td class="nombre">H. Juan Monterrosa</td>
<td></td><td class="activo">✔</td><td></td>
<td></td><td></td><td class="activo">✔</td><td></td><td></td>
<td></td><td class="activo">✔</td><td></td><td></td>
</tr>

<!-- GABRIEL -->
<tr>
<td class="nombre">H. Gabriel Olivares</td>
<td></td><td></td><td class="activo">✔</td>
<td></td><td></td><td></td><td class="activo">✔</td><td></td>
<td></td><td></td><td class="activo">✔</td><td></td>
</tr>

<!-- ENRIQUE -->
<tr>
<td class="nombre">H. Enrique Ramírez</td>
<td></td><td></td><td></td>
<td class="activo">✔</td><td></td><td></td><td></td><td class="activo">✔</td>
<td></td><td></td><td></td><td class="activo">✔</td>
</tr>

</table>

</div>



</div>

<!-- JS -->
<script>

document.querySelectorAll("td").forEach(td=>{

    if(td.classList.contains("nombre")) return;

    td.addEventListener("click",function(){

        if(this.classList.contains("activo")){
            this.classList.remove("activo");
            this.innerHTML="";
        }else{
            this.classList.add("activo");
            this.innerHTML="✔";
        }

    });

});

</script>

</body>
</html>
