<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Programa de Cantores</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   BASE
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0B1F3A,#0f2f5c,#eef2f7);
    min-height:100vh;
    padding:10px;
}

/* =========================
   CONTENEDOR
========================= */

.contenedor{
    width:100%;
    max-width:100%;
    background:white;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 10px 40px rgba(0,0,0,.2);
}

/* =========================
   HEADER
========================= */

.encabezado{
    background:linear-gradient(90deg,#0B1F3A,#1565C0);
    color:white;
    text-align:center;
    padding:18px;
}

.encabezado h1{
    font-size:20px;
}

/* =========================
   SCROLL REAL HORIZONTAL
========================= */

.tabla-scroll{
    width:100%;
    overflow-x:auto;
    overflow-y:hidden;
    -webkit-overflow-scrolling:touch;
}

/* 🔥 CLAVE: esto evita que se comprima */
table{
    border-collapse:collapse;
    min-width:1600px;   /* MUY IMPORTANTE */
    width:max-content;
}

/* =========================
   CELDAS
========================= */

th, td{
    border:1px solid #e5e7eb;
    padding:10px;
    text-align:center;
    white-space:nowrap; /* 🔥 evita salto raro */
}

/* encabezados */
th{
    background:#0B1F3A;
    color:white;
    position:sticky;
    top:0;
}

/* =========================
   NOMBRE FIJO
========================= */

.nombre{
    position:sticky;
    left:0;
    background:#f8fafc;
    font-weight:600;
    min-width:200px;
    text-align:left;
    padding-left:12px;
    z-index:5;
}

/* =========================
   MESES
========================= */

.mes{
    background:#1565C0;
    color:white;
}

/* =========================
   ACTIVO (BARRA GANTT)
========================= */

.activo{
    background:#2563EB;
    color:white;
    font-weight:bold;
}

/* =========================
   IMPORTANTE MOBILE
========================= */

@media(max-width:768px){

    body{
        padding:0;
        background:white;
    }

    .encabezado h1{
        font-size:18px;
    }

    /* 🔥 NO reducir tabla, solo permitir scroll */
    table{
        min-width:1600px;
    }

    .tabla-scroll{
        overflow-x:auto;
        display:block;
    }

}

</style>

</head>

<body>

<div class="contenedor">

<!-- HEADER -->
<div class="encabezado">
    <h1>🎤 PROGRAMA DE CANTORES</h1>
    <p>Ministerio de Alabanza</p>
</div>

<!-- TABLA -->
<div class="tabla-scroll">

<table>

<!-- MESES -->
<tr>
<th class="nombre" rowspan="2">Cantor</th>
<th class="mes" colspan="3">JULIO</th>
<th class="mes" colspan="5">AGOSTO</th>
<th class="mes" colspan="4">SEPTIEMBRE</th>
</tr>

<!-- FECHAS -->
<tr>
<th>12</th><th>19</th><th>26</th>
<th>02</th><th>09</th><th>16</th><th>23</th><th>30</th>
<th>06</th><th>13</th><th>20</th><th>27</th>
</tr>

<!-- CARLOS -->
<tr>
<td class="nombre">H. Carlos García</td>
<td class="activo">✔</td><td></td><td></td>
<td></td><td class="activo">✔</td><td></td><td></td><td></td>
<td class="activo">✔</td><td></td><td></td><td></td>
</tr>

<!-- JUAN -->
<tr>
<td class="nombre">H. Juan Monterrosa</td>
<td></td><td class="activo">✔</td><td></td>
<td></td><td></td><td class="activo">✔</td><td></td><td></td>
<td></td><td class="activo">✔</td><td></td><td></td>
</tr>

<!-- GABRIEL -->
<tr>
<td class="nombre">H. Gabriel Olivares</td>
<td></td><td></td><td class="activo">✔</td>
<td></td><td></td><td></td><td class="activo">✔</td><td></td>
<td></td><td></td><td class="activo">✔</td><td></td>
</tr>

<!-- ENRIQUE -->
<tr>
<td class="nombre">H. Enrique Ramírez</td>
<td></td><td></td><td></td>
<td class="activo">✔</td><td></td><td></td><td></td><td class="activo">✔</td>
<td></td><td></td><td></td><td class="activo">✔</td>
</tr>

</table>

</div>


</div>

<!-- JS -->
<script>

document.querySelectorAll("td").forEach(td => {

    if(td.classList.contains("nombre")) return;

    td.addEventListener("click", function(){

        // solo toggle de clase
        this.classList.toggle("activo");

        // no tocar innerHTML → EVITA ERRORES
    });

});

</script>

</body>
</html>
