<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reuniones de Ensayo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0B1F3A,#1565C0,#eef2f7);
    padding:15px;
}

.contenedor{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    color:white;
    font-size:22px;
    margin-bottom:20px;
}

/* =========================
   CARD MODERNA WORSHIP
========================= */

.card{
    background: linear-gradient(145deg,#ffffff,#f8fafc);
    border-radius:18px;
    margin-bottom:18px;
    overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.15);
    border:1px solid rgba(37,99,235,.08);
    transition:.25s ease;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 18px 45px rgba(0,0,0,.22);
}

/* FECHA */
.fecha{
    background:linear-gradient(90deg,#0B1F3A,#2563eb);
    color:white;
    padding:14px 16px;
    font-weight:700;
    letter-spacing:.5px;
    display:flex;
    align-items:center;
    gap:8px;
}

/* CUERPO */
.cuerpo{
    padding:18px;
}

/* TITULO */
.label{
    font-weight:700;
    font-size:14px;
    color:#0B1F3A;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:6px;
}

/* LISTA DE CANCIONES */
.cancion{
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 12px;
    margin:8px 0;
    border-radius:10px;
    background:#f1f5f9;
    color:#1d4ed8;
    font-weight:600;
    transition:.2s ease;
    border-left:4px solid transparent;
}

.cancion:hover{
    background:#e0ecff;
    border-left:4px solid #2563eb;
    transform:scale(1.01);
}

/* ICONO ANTES DEL TEXTO */
.cancion::before{
    content:"🎵";
    margin-right:10px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
    padding:15px;
}

.modal-contenido{
    background:white;
    width:100%;
    max-width:650px;
    border-radius:15px;
    padding:20px;
    position:relative;
}

.modal-contenido h2{
    margin:0 0 10px 0;
    color:#0B1F3A;
}

pre{
    white-space:pre-wrap;
    background:#f4f6f9;
    padding:12px;
    border-radius:10px;
    font-family:monospace;
}

.cerrar{
    position:absolute;
    right:15px;
    top:10px;
    cursor:pointer;
    font-size:22px;
}

</style>

</head>

<body>

<div class="contenedor">

<h1>🎤 REUNIONES DE ENSAYO</h1>

<!-- JULIO 12 -->
<div class="card">
    <div class="fecha">📅 Domingo 12 de Julio</div>
    <div class="cuerpo">

        <div class="label">🎶 Alabanzas a Ensayar</div>

        <span class="cancion" onclick="abrirCancion('poderoso')">PODEROSO DIOS</span>
        <span class="cancion" onclick="abrirCancion('mirada')">TU MIRADA</span>
        <span class="cancion" onclick="abrirCancion('hermoso')">HERMOSO ERES</span>

    </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">

    <div class="modal-contenido">

        <span class="cerrar" onclick="cerrarModal()">✖</span>

        <h2 id="titulo"></h2>

        <pre id="letra"></pre>

    </div>

</div>

</div>

<script>

const canciones = {

`
},

hermoso: {

    letra: `

Bm                        E

Bm      A/C# D    E     A

`
}

};

function abrirCancion(nombre){
    document.getElementById("titulo").innerText = canciones[nombre].titulo;
    document.getElementById("letra").innerText = canciones[nombre].letra;
    document.getElementById("modal").style.display = "flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

window.onclick = function(e){
    let modal = document.getElementById("modal");
    if(e.target == modal){
        modal.style.display = "none";
    }
}

</script>

</body>
</html>
